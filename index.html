<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no"/>
<meta name="theme-color" content="#e8eaf0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="light"/>
<meta name="apple-mobile-web-app-title" content="Cashbook"/>
<link rel="manifest" href="./manifest.json"/>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='28' font-size='28'>💰</text></svg>"/>
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect width='192' height='192' rx='32' fill='%233d6bdf'/><text y='148' x='16' font-size='140'>💰</text></svg>"/>
<title>Cashbook</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#e8eaf0;--bg2:#f0f2f8;--bg3:#ffffff;--bg4:#dde0e8;
  --line:#d0d4e0;--line2:#c4c8d8;
  --text:#1a1d2e;--text2:#5a5f7a;--text3:#9a9fb8;
  --green:#00b87a;--green2:rgba(0,184,122,0.12);
  --red:#e83e5c;--red2:rgba(232,62,92,0.12);
  --gold:#e8a020;--gold2:rgba(232,160,32,0.12);
  --blue:#3d6bdf;--blue2:rgba(61,107,223,0.12);
  --purple:#8b5cf6;--purple2:rgba(139,92,246,0.12);
  --orange:#f07030;--orange2:rgba(240,112,48,0.12);
  --teal:#00a8a0;--teal2:rgba(0,168,160,0.12);
  --sh-out:6px 6px 14px rgba(160,165,185,0.5),-4px -4px 10px rgba(255,255,255,0.9);
  --sh-in:inset 3px 3px 8px rgba(160,165,185,0.4),inset -2px -2px 6px rgba(255,255,255,0.8);
  --sh-card:0 2px 20px rgba(140,145,170,0.18),0 1px 4px rgba(140,145,170,0.1);
  --sh-float:0 8px 32px rgba(120,125,155,0.22),0 2px 8px rgba(120,125,155,0.12);
  --r:18px;--r2:12px;--r3:8px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;}
button{font-family:'Plus Jakarta Sans',sans-serif;cursor:pointer;border:none;outline:none;}
input,select,textarea{font-family:'DM Mono',monospace;outline:none;}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:var(--line2);border-radius:3px;}

/* PIN */
#pinScreen{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px;}
.pin-logo-wrap{width:72px;height:72px;border-radius:22px;background:linear-gradient(145deg,#3d6bdf,#6b8fff);box-shadow:var(--sh-out);display:flex;align-items:center;justify-content:center;font-size:2rem;margin-bottom:20px;}
.pin-brand{font-size:1.8rem;font-weight:800;letter-spacing:-0.04em;margin-bottom:4px;}
.pin-brand span{color:var(--blue);}
.pin-tagline{font-size:0.68rem;color:var(--text3);letter-spacing:0.16em;text-transform:uppercase;margin-bottom:36px;}
.pin-dots{display:flex;gap:16px;margin-bottom:36px;}
.pd{width:14px;height:14px;border-radius:50%;background:var(--bg4);box-shadow:var(--sh-in);transition:all 0.18s;}
.pd.on{background:var(--blue);box-shadow:0 0 0 3px rgba(61,107,223,0.25);}
.pd.err{background:var(--red);box-shadow:0 0 0 3px rgba(232,62,92,0.25);}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:280px;margin-bottom:20px;}
.pk{height:60px;border-radius:14px;background:var(--bg2);box-shadow:var(--sh-out);font-size:1.3rem;font-weight:700;color:var(--text);display:flex;align-items:center;justify-content:center;user-select:none;transition:all 0.12s;}
.pk:active{box-shadow:var(--sh-in);transform:scale(0.96);}
.pk:hover{background:var(--bg3);box-shadow:0 4px 12px rgba(61,107,223,0.15);}
.pk.del{font-size:1rem;color:var(--text2);}
.pk.empty{pointer-events:none;background:transparent;box-shadow:none;}
.pin-err{font-size:0.74rem;color:var(--red);min-height:18px;font-weight:700;text-align:center;}
@keyframes shake{0%,100%{transform:translateX(0);}25%,75%{transform:translateX(-6px);}50%{transform:translateX(6px);}}
.shaking{animation:shake 0.38s ease;}

/* APP */
#app{display:none;height:100%;flex-direction:column;}
#app.on{display:flex;}

/* TOPBAR */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 18px 14px;flex-shrink:0;background:var(--bg);border-bottom:1px solid var(--line);}
.topbar-brand{font-size:1.15rem;font-weight:800;letter-spacing:-0.03em;}
.topbar-brand span{color:var(--blue);}
.topbar-right{display:flex;gap:8px;align-items:center;}
.tb-btn{background:var(--bg2);box-shadow:var(--sh-out);color:var(--text2);border-radius:10px;padding:7px 13px;font-size:0.68rem;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;transition:all 0.15s;}
.tb-btn:hover{background:var(--bg3);}
.tb-btn:active{box-shadow:var(--sh-in);}
.tb-btn.primary{background:linear-gradient(135deg,#3d6bdf,#5a84ff);color:#fff;box-shadow:0 4px 14px rgba(61,107,223,0.35);}
.tb-btn.install{background:linear-gradient(135deg,#00a8a0,#00c8be);color:#fff;box-shadow:0 4px 14px rgba(0,168,160,0.35);display:none;}

/* NAV */
.nav{display:flex;overflow-x:auto;scrollbar-width:none;background:var(--bg);border-bottom:1px solid var(--line);flex-shrink:0;}
.nav::-webkit-scrollbar{display:none;}
.nav-btn{flex-shrink:0;padding:12px 16px;font-size:0.66rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--text3);background:none;border:none;border-bottom:2px solid transparent;transition:all 0.18s;white-space:nowrap;}
.nav-btn.active{color:var(--blue);border-bottom-color:var(--blue);}
.nav-btn:hover:not(.active){color:var(--text2);}

/* SCROLL */
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;background:var(--bg);}
.main{padding:18px;max-width:520px;margin:0 auto;padding-bottom:52px;}
.tab{display:none;}
.tab.active{display:block;}
.sh{font-size:0.6rem;font-weight:800;letter-spacing:0.16em;text-transform:uppercase;color:var(--text3);margin:22px 0 10px;}

/* MASTER CARD */
.master-card{background:linear-gradient(135deg,#2a4fcf 0%,#3d6bdf 40%,#5580f0 100%);border-radius:22px;padding:24px;margin-bottom:16px;box-shadow:0 8px 32px rgba(61,107,223,0.35);position:relative;overflow:hidden;}
.master-card::before{content:'';position:absolute;top:-60px;right:-60px;width:200px;height:200px;border-radius:50%;background:rgba(255,255,255,0.07);}
.mc-label{font-size:0.6rem;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:rgba(255,255,255,0.65);margin-bottom:8px;}
.mc-amount{font-family:'DM Mono',monospace;font-size:2.6rem;font-weight:500;color:#fff;letter-spacing:-0.02em;line-height:1;margin-bottom:20px;position:relative;z-index:1;}
.mc-amount.neg{color:#ffb3c0;}
.mc-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;position:relative;z-index:1;}
.mc-stat{background:rgba(255,255,255,0.12);backdrop-filter:blur(8px);border-radius:12px;padding:10px 12px;border:1px solid rgba(255,255,255,0.1);}
.mc-stat-lbl{font-size:0.54rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.55);margin-bottom:5px;}
.mc-stat-val{font-family:'DM Mono',monospace;font-size:0.78rem;font-weight:500;color:#fff;}
.mc-stat-val.g{color:#7fffd4;}
.mc-stat-val.r{color:#ffb3c0;}
.mc-stat-val.b{color:#b3d4ff;}
.mc-stat-val.o{color:#ffd080;}

/* Owner injection label */
.owner-injection-row{margin-top:12px;position:relative;z-index:1;background:rgba(255,255,255,0.1);border-radius:10px;padding:8px 12px;display:flex;justify-content:space-between;align-items:center;}
.oil-label{font-size:0.56rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.6);}
.oil-val{font-family:'DM Mono',monospace;font-size:0.78rem;font-weight:500;color:#ffd080;}

/* PERSON CARDS */
.person-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;}
.person-card{background:var(--bg3);border-radius:var(--r);padding:16px;box-shadow:var(--sh-card);cursor:pointer;transition:all 0.2s;border:1.5px solid transparent;}
.person-card:hover{transform:translateY(-2px);box-shadow:var(--sh-float);border-color:var(--blue);}
.pc-avatar{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:0.82rem;font-weight:800;margin-bottom:10px;text-transform:uppercase;}
.pc-name{font-size:0.8rem;font-weight:700;color:var(--text);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pc-role{font-size:0.58rem;color:var(--text3);letter-spacing:0.06em;margin-bottom:10px;text-transform:uppercase;}
.pc-balance{font-family:'DM Mono',monospace;font-size:1.05rem;font-weight:600;}
.pc-balance.pos{color:var(--green);}
.pc-balance.neg{color:var(--red);}
.pc-meta{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap;}
.pc-chip{font-size:0.54rem;font-weight:700;padding:2px 7px;border-radius:6px;letter-spacing:0.04em;text-transform:uppercase;}
.pc-chip.in{background:var(--green2);color:var(--green);}
.pc-chip.out{background:var(--red2);color:var(--red);}
</style>
</head>
<body>
<div id="pinScreen">
<div class="pin-logo-wrap">💰</div>
<div class="pin-brand">Cash<span>book</span></div>
<div class="pin-tagline">Farm Expense Tracker</div>
<div class="pin-dots" id="pinDots">
<div class="pd"></div>
<div class="pd"></div>
<div class="pd"></div>
<div class="pd"></div>
</div>
<div class="pin-pad" id="pinPad"></div>
<div class="pin-err" id="pinErr"></div>
</div>
<div id="syncBar" style="display:none;"><span id="syncDot"></span><span id="syncText">Syncing...</span></div>
<div id="app">
<div class="topbar">
<div class="topbar-brand">Cash<span>book</span></div>
<div class="topbar-right">
<button class="tb-btn" onclick="exportData()">Export</button>
<button class="tb-btn primary" onclick="showTab('add')">+ Add</button>
</div>
</div>
<div class="nav" id="nav"></div>
<div class="scroll">
<div class="main" id="main"></div>
</div>
</div>

<script>
// ═════════════════════════════════════════════════════════════════════════════
// PIN AUTHENTICATION — 4 Digits
// ═════════════════════════════════════════════════════════════════════════════

// SHA-256 hashes of the PIN codes (for security)
const H_MASTER = '7e2e9e2fa945d8c13d48a658d6fff4fbb3201ea4e5cfa2c8ab56c4cf7e81fdd6'; // 0012
const H_VIEW = '7e4d7baca4026c5598a6ecad8a139b54d4a1a120e4bbb171321f1f5f8987c46c';   // 8888

let pinEntry = '';
let readOnly = false;
let attempts = 3;
const maxAttempts = 3;

// SHA-256 hash function (using Web Crypto API)
async function sha256(s) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(s));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}

// Build PIN Pad with properly numbered keyboard (0-9, Del, empty)
function buildPinPad() {
  const pinPad = document.getElementById('pinPad');
  const buttons = [];
  
  // Top row: 1 2 3
  // Mid row: 4 5 6
  // Bot row: 7 8 9
  // Dlt row: * 0 #
  const layout = [1, 2, 3, 4, 5, 6, 7, 8, 9, 0];
  
  layout.forEach(digit => {
    let btn = document.createElement('button');
    btn.className = 'pk';
    btn.textContent = digit;
    btn.onclick = () => enterPin(digit);
    buttons.push(btn);
  });
  
  // Delete button
  let delBtn = document.createElement('button');
  delBtn.className = 'pk del';
  delBtn.textContent = '⌫';
  delBtn.onclick = () => deletePin();
  buttons.push(delBtn);
  
  // Empty placeholder (for 4x3 grid alignment)
  let emptyBtn = document.createElement('button');
  emptyBtn.className = 'pk empty';
  buttons.push(emptyBtn);
  
  buttons.forEach(btn => pinPad.appendChild(btn));
}

function updatePinDots() {
  const dots = document.querySelectorAll('.pd');
  dots.forEach((d, i) => {
    d.classList.remove('on', 'err');
    if (i < pinEntry.length) d.classList.add('on');
  });
}

function enterPin(digit) {
  if (pinEntry.length < 4) {
    pinEntry += digit;
    updatePinDots();
    if (pinEntry.length === 4) {
      setTimeout(checkPin, 120);
    }
  }
}

function deletePin() {
  if (pinEntry.length > 0) {
    pinEntry = pinEntry.slice(0, -1);
    updatePinDots();
  }
}

async function checkPin() {
  const h = await sha256(pinEntry);
  const pinErr = document.getElementById('pinErr');
  
  if (h === H_MASTER) {
    // Master access
    sessionStorage.setItem('cb_session', 'master');
    unlockApp(false);
  } else if (h === H_VIEW) {
    // View-only access
    sessionStorage.setItem('cb_session', 'view');
    unlockApp(true);
  } else {
    // Wrong PIN
    attempts--;
    updatePinDots('err');
    document.getElementById('pinDots').classList.add('shaking');
    
    if (attempts > 0) {
      pinErr.textContent = `Wrong PIN. ${attempts} attempt${attempts !== 1 ? 's' : ''} left.`;
    } else {
      pinErr.textContent = 'Too many attempts. Refreshing...';
    }
    
    setTimeout(() => {
      document.getElementById('pinDots').classList.remove('shaking');
      pinEntry = '';
      updatePinDots();
      
      if (attempts <= 0) {
        pinErr.textContent = '';
        location.reload();
      } else {
        pinErr.textContent = '';
      }
    }, 900);
  }
}

function unlockApp(ro) {
  readOnly = ro;
  document.getElementById('pinScreen').style.display = 'none';
  document.getElementById('app').classList.add('on');
  initApp();
}

function lockApp() {
  sessionStorage.removeItem('cb_session');
  document.getElementById('app').classList.remove('on');
  document.getElementById('pinScreen').style.display = 'flex';
  readOnly = false;
  pinEntry = '';
  updatePinDots();
  attempts = maxAttempts;
}

// Initialize PIN Pad on load
buildPinPad();

// Auto-unlock if session exists
window.addEventListener('DOMContentLoaded', () => {
  const session = sessionStorage.getItem('cb_session');
  if (session === 'master' || session === 'view') {
    unlockApp(session === 'view');
  }
});

// ═════════════════════════════════════════════════════════════════════════════
// APP INITIALIZATION
// ═════════════════════════════════════════════════════════════════════════════

function initApp() {
  setupUI();
}

function setupUI() {
  let navHTML = '<button class="nav-btn active" onclick="showTab(\'overview\')">Overview</button><button class="nav-btn" onclick="showTab(\'add\')">Add Entry</button><button class="nav-btn" onclick="showTab(\'people\')">People</button><button class="nav-btn" onclick="lockApp()">🔐 Lock</button>';
  document.getElementById('nav').innerHTML = navHTML;
  showTab('overview');
}

function showTab(tab) {
  let html = '<div style="padding:20px;text-align:center;color:var(--text3);">Tab: ' + tab + '</div>';
  document.getElementById('main').innerHTML = html;
}

function exportData() {
  alert('Export feature coming soon');
}

</script>
</body>
</html>
